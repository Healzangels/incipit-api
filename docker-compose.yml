# incipit-api self-hosted stack — API + MongoDB + Redis, self-contained.
#
# Mongo backs the inherited audnexus routes (author search, author/book data
# lookup by ASIN, chapters). Redis caches provider search results (easing
# Hardcover's 60 req/min limit) and audnexus responses. Both run internally on
# the compose network; nothing here depends on an external service.
#
# Copy .env.example to .env and fill in your OWN Hardcover token before running:
#   docker compose up -d --build

services:
  incipit-api:
    # Default: build the image locally from source (works with no registry setup).
    # To use a pre-built image instead, comment out `build:` and set:
    #   image: ghcr.io/healzangels/incipit-api:latest
    # then `docker compose pull && docker compose up -d`.
    build: .
    image: incipit-api:local
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Mongo and Redis are internal-only on the compose network.
      MONGODB_URI: mongodb://mongo:27017
      REDIS_URL: redis://redis:6379
      HOST: 0.0.0.0
      PORT: "3000"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DEFAULT_REGION: ${DEFAULT_REGION:-us}
      # Providers. Every token here is the operator's own or a keyless public
      # source — nothing is bundled. Hardcover is optional; blank simply skips it.
      HARDCOVER_TOKEN: ${HARDCOVER_TOKEN:-}
      OL_CONTACT: ${OL_CONTACT:-}
    ports:
      # Published so the Plex agent (Incipit.bundle) can reach the API.
      - "${API_PORT:-3000}:3000"

  mongo:
    image: mongo:7
    restart: unless-stopped
    # No published port: only incipit-api talks to it, over the compose network.
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # No published port: only incipit-api talks to it, over the compose network.
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo-data:
  redis-data:
