# incipit-api deployment — Option A: MongoDB only, no Redis.
#
# Mongo backs the inherited audnexus routes (author search, author/book data
# lookup by ASIN, chapters). The new multi-provider book search is stateless and
# needs no datastore. Redis is an OPTIONAL performance cache for provider search
# results; it is left out here and the API degrades to live provider calls. To
# add it later, uncomment the redis service and set REDIS_URL on incipit-api.
#
# Copy .env.example to .env and fill in your OWN Hardcover token before running:
#   docker compose up -d --build

services:
  incipit-api:
    build: .
    image: incipit-api:local
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      # Mongo is internal-only on the compose network.
      MONGODB_URI: mongodb://mongo:27017
      HOST: 0.0.0.0
      PORT: "3000"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DEFAULT_REGION: ${DEFAULT_REGION:-us}
      # Providers. Every token here is the operator's own or a keyless public
      # source — nothing is bundled. Hardcover is optional; blank simply skips it.
      HARDCOVER_TOKEN: ${HARDCOVER_TOKEN:-}
      OL_CONTACT: ${OL_CONTACT:-}
      # REDIS_URL: redis://redis:6379   # uncomment with the redis service below
    ports:
      # Published so the Plex agent (Incipit.bundle) can reach the API.
      - "${API_PORT:-3000}:3000"

  mongo:
    image: mongo:7
    restart: unless-stopped
    # No published port: only incipit-api talks to it, over the compose network.
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Optional provider-search cache. Uncomment this and REDIS_URL above to enable.
  # redis:
  #   image: redis:7-alpine
  #   restart: unless-stopped
  #   volumes:
  #     - redis-data:/data

volumes:
  mongo-data:
  # redis-data:
