name: Docker

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  # NOTE: on a fork, GitHub can suppress event-triggered runs (push/schedule);
  # publish via `gh workflow run docker-publish.yml --ref nightly` if a push
  # doesn't build. Manual trigger also builds from any branch on demand.
  workflow_dispatch:
  push:
    branches:
      - nightly
      - release
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ nightly, release ]

env:
  # GitHub Container Registry — always published (uses the built-in GITHUB_TOKEN).
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}
  # Docker Hub image, e.g. "healzangels/incipit-api". Empty (so Docker Hub is
  # skipped) unless BOTH secrets are set: DOCKERHUB_USERNAME and DOCKERHUB_TOKEN
  # (a Docker Hub access token). Requiring both avoids a half-configured login
  # failing the build.
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' && format('{0}/incipit-api', secrets.DOCKERHUB_USERNAME) || '' }}


jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      # Login against GHCR except on PR
      # https://github.com/docker/login-action
      - name: Log into GHCR (${{ env.REGISTRY }})
        if: github.event_name != 'pull_request'
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Log into Docker Hub only when its credentials are configured
      - name: Log into Docker Hub
        if: env.DOCKERHUB_IMAGE != '' && github.event_name != 'pull_request'
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@60a0d343a0d8a18aedee9d34e62251f752153bdb
        with:
          # Both registries; the Docker Hub line is blank (and ignored) when unset.
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ env.DOCKERHUB_IMAGE }}
          # :nightly and :release come from the branch name; :latest tracks the
          # stable `release` branch; semver :<tag> from version tags.
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/release' }}
            type=ref,event=branch
            type=semver,pattern={{version}}

      # Wall-clock build time for GET /version. Computed here rather than taken
      # from a github.event field so it is present for every trigger, including
      # workflow_dispatch (where repository/head_commit fields can be absent).
      - name: Capture build timestamp
        id: buildmeta
        run: echo "time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        uses: docker/build-push-action@5cd11c3a4ced054e52742c5fd54dca954e0edd85
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Baked into the image and reported by GET /version, so a deploy can
          # be confirmed against `git log` rather than inferred from pull output.
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ steps.buildmeta.outputs.time }}
